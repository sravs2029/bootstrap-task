<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">MySite</a>
    <div>
      <a class="nav-link d-inline text-white mx-2" href="index.html">Home</a>
      <a class="nav-link d-inline text-white mx-2" href="about.html">About</a>
      <a class="nav-link d-inline text-white mx-2" href="contact.html">Contact</a>
    </div>
  </div>
</nav>

<div class="container my-5">
  <h2 class="text-center mb-4">Contact Us</h2>

  <form>
    <div class="mb-3">
      <input type="text" class="form-control" placeholder="Enter your name" required>
    </div>

    <div class="mb-3">
      <input type="email" class="form-control" placeholder="Enter your email" required>
    </div>

    <div class="mb-3">
      <textarea class="form-control" rows="4" placeholder="Enter your message" required></textarea>
    </div>

    <div class="text-center">
      <button class="btn btn-primary">Send Message</button>
    </div>
  </form>
</div>

<footer class="bg-dark text-white text-center p-3">
  © 2026 MySite
</footer>
